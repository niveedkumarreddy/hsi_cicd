##############################################################################################################
#                                                                                                            #
# synchronize_qa.yml : Imports assets to QA Stage                                                            #
# Converted from Azure DevOps to GitHub Actions                                                              #
#                                                                                                            #
# ####### Inputs ########                                                                                    #
# assetID:      (Optional) ID of the asset to be imported                                                    #
# assetType:    (Optional) Type of the asset. Supported: workflow, flowservice                               #
# repoName:     (Mandatory) Name of the corresponding repository                                             #
# synchProject: (Mandatory) true = sync full project; false = provide assetID + assetType                   #
# includeAllReferenceData: (Optional) Include all reference data on import                                   #
# fullBuild:    (Optional) true = use full build import with importAssetsWithFullBuild.sh                    #
# projectHasAPIs: (Optional) true = skip project creation if synchProject is also true                       #
##############################################################################################################

name: Synchronize QA (Import)

on:
  workflow_dispatch:
    inputs:
      assetID:
        description: "(Optional) ID of the asset to import"
        required: false
        default: ""
      assetType:
        description: "(Optional) Type of the asset (workflow, flowservice)"
        required: false
        default: ""
      repoName:
        description: "(Mandatory) Name of the project repository"
        required: true
      synchProject:
        description: "(Mandatory) true = sync full project"
        required: true
        default: "false"
      includeAllReferenceData:
        description: "(Optional) Include all reference data on import"
        required: false
        default: "false"
      fullBuild:
        description: "(Optional) true = use full build import"
        required: false
        default: "false"
      projectHasAPIs:
        description: "(Optional) true = skip project creation if synchProject is true"
        required: false
        default: "false"

jobs:
  synchronize-qa:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout pipeline/scripts repo (self) ─────────────────────────────
      - name: Checkout Pipeline Repo (self)
        uses: actions/checkout@v4
        with:
          submodules: "true"
          persist-credentials: "true"
          clean: "true"
          path: self

      # ── 2. Checkout project repo — always from the 'qa' branch ───────────────
      - name: Checkout Project Repo (qa branch)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GIT_OWNER }}/${{ github.event.inputs.repoName }}
          token: ${{ secrets.PAT }}
          ref: qa
          submodules: "true"
          persist-credentials: "true"
          clean: "true"
          path: ${{ github.event.inputs.repoName }}

      # ── 3. Adjust variables for full project sync ─────────────────────────────
      # NOTE: QA pipeline uses singular 'assetID' / 'assetType' (not List variants)
      - name: Adjust Variables (full project sync)
        if: ${{ github.event.inputs.synchProject == 'true' }}
        run: |
          echo "ASSET_ID=NA"   >> $GITHUB_ENV
          echo "ASSET_TYPE=NA" >> $GITHUB_ENV

      - name: Set Asset Variables from Inputs
        if: ${{ github.event.inputs.synchProject != 'true' }}
        run: |
          echo "ASSET_ID=${{ github.event.inputs.assetID }}"     >> $GITHUB_ENV
          echo "ASSET_TYPE=${{ github.event.inputs.assetType }}" >> $GITHUB_ENV

      # ── 4. Get environment tenant details from qa.yml ─────────────────────────
      # NOTE: Original had a typo — configs/env//qa.yml (double slash) — fixed here
      - name: Get Environment Tenant Details
        working-directory: self
        run: |
          pwd
          ls -ltr

          echo "SOURCE_ENV_HOSTNAME=$(yq -e '.tenant.hostname'      configs/env/qa.yml)" >> $GITHUB_ENV
          echo "SOURCE_ENV_PORT=$(yq -e '.tenant.port'              configs/env/qa.yml)" >> $GITHUB_ENV
          
          # Check if X-INSTANCE-API-KEY exists (Gen-2), otherwise use admin_username (Gen-1)
          if yq -e '.tenant.X-INSTANCE-API-KEY' configs/env/qa.yml > /dev/null 2>&1; then
            echo "X_INSTANCE_API_KEY=$(yq -e '.tenant.X-INSTANCE-API-KEY' configs/env/qa.yml)" >> $GITHUB_ENV
            echo "AUTH_TYPE=gen2" >> $GITHUB_ENV
          else
            echo "ADMIN_USER=$(yq -e '.tenant.admin_username' configs/env/qa.yml)" >> $GITHUB_ENV
            echo "AUTH_TYPE=gen1" >> $GITHUB_ENV
          fi
          
          echo "SOURCE_TYPE=$(yq -e '.tenant.type'                  configs/env/qa.yml)" >> $GITHUB_ENV
          echo "PROVIDER=$(yq -e '.repo.security_provider'          configs/repo.yml)"    >> $GITHUB_ENV

          # URL-encode repo name (replaces perl URI::Escape)
          ENCODED_REPO=$(python3 -c \
            "import urllib.parse; print(urllib.parse.quote('${{ github.event.inputs.repoName }}'))")
          echo "ENCODED_REPO_NAME=${ENCODED_REPO}" >> $GITHUB_ENV
          echo "Build: ${{ github.run_number }}-${ENCODED_REPO}"

      # ── 5. Check / create project and import assets ───────────────────────────
      - name: Import Asset
        env:
          ADMIN_PASSWORD:        ${{ secrets.ADMIN_PASSWORD }}
          X_INSTANCE_API_KEY:    ${{ secrets.X_INSTANCE_API_KEY }}
          AZURE_VAULT_NAME:      ${{ secrets.AZURE_VAULT_NAME }}
          AZURE_RESOURCE_GROUP:  ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_LOCATION:        ${{ secrets.AZURE_LOCATION }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ACCESS_OBJECT_ID: ${{ secrets.AZURE_ACCESS_OBJECT_ID }}
        run: |
          LOCAL_QA_URL="https://${SOURCE_ENV_HOSTNAME}:${SOURCE_ENV_PORT}"
          echo "Target URL: ${LOCAL_QA_URL}"
          HOME_DIR="${GITHUB_WORKSPACE}/"
          
          # Set Azure parameters to "NA" if not provided (scripts require non-empty values)
          AZURE_VAULT_NAME="${AZURE_VAULT_NAME:-NA}"
          AZURE_RESOURCE_GROUP="${AZURE_RESOURCE_GROUP:-NA}"
          AZURE_LOCATION="${AZURE_LOCATION:-NA}"
          AZURE_TENANT_ID="${AZURE_TENANT_ID:-NA}"
          AZURE_CLIENT_ID="${AZURE_CLIENT_ID:-NA}"
          AZURE_CLIENT_SECRET="${AZURE_CLIENT_SECRET:-NA}"
          AZURE_ACCESS_OBJECT_ID="${AZURE_ACCESS_OBJECT_ID:-NA}"

          cd "${{ github.event.inputs.repoName }}"
          ls -ltr

          chmod +x -R ../self/pipelines/scripts/*.sh

          # Read existing project ID from project-config.yml
          existingProject_id=$(yq e '.project.project-id' "./project-config.yml")
          echo "Existing Project ID: [${existingProject_id}]"

          # Check and create project (skip if projectHasAPIs and synchProject are both true)
          projectHasAPIsValue="${{ github.event.inputs.projectHasAPIs }}"
          synchProjectValue="${{ github.event.inputs.synchProject }}"
          
          if [[ "$projectHasAPIsValue" == "true" ]] && [[ "$synchProjectValue" == "true" ]]; then
            echo "Skipping project creation because project has APIs and synchProject is true"
          else
            echo "Checking and creating project..."
            if [ "${AUTH_TYPE}" == "gen2" ]; then
              project_id=$(../self/pipelines/scripts/createProject.sh \
                "${LOCAL_QA_URL}" \
                "${X_INSTANCE_API_KEY}" \
                "${{ github.event.inputs.repoName }}" \
                "${existingProject_id}" \
                "debug" 2> >(tee >&2))
            else
              project_id=$(../self/pipelines/scripts/createProject.sh \
                "${LOCAL_QA_URL}" \
                "${ADMIN_USER}" \
                "${ADMIN_PASSWORD}" \
                "${{ github.event.inputs.repoName }}" \
                "${existingProject_id}" \
                "debug" 2> >(tee >&2))
            fi
            echo "Captured Project ID: [${project_id}]"
          fi

          # Debug info
          echo "Hostname:    ${SOURCE_ENV_HOSTNAME}"
          echo "Port:        ${SOURCE_ENV_PORT}"
          if [ "${AUTH_TYPE}" == "gen2" ]; then
            echo "Auth:        Gen-2 API Key"
          else
            echo "Admin user:  ${ADMIN_USER}"
          fi
          echo "Source type: ${SOURCE_TYPE}"
          echo "Asset ID:    ${ASSET_ID}"
          echo "Asset type:  ${ASSET_TYPE}"
          echo "Home dir:    ${HOME_DIR}"
          echo "Sync:        ${{ github.event.inputs.synchProject }}"
          echo "Full Build:  ${{ github.event.inputs.fullBuild }}"

          # Import assets - check if fullBuild is enabled
          fullBuildValue="${{ github.event.inputs.fullBuild }}"
          echo "fullBuildValue: $fullBuildValue"
          
          if [ "$fullBuildValue" == "true" ]; then
            echo "Using Full Build Import..."
            # Determine auth parameter based on type
            if [ "${AUTH_TYPE}" == "gen2" ]; then
              AUTH_PARAM="${X_INSTANCE_API_KEY}"
            else
              AUTH_PARAM="${ADMIN_USER}"
            fi
            
            ../self/pipelines/scripts/importAssetsWithFullBuild.sh \
              "${LOCAL_QA_URL}" \
              "${AUTH_PARAM}" \
              "${{ github.event.inputs.repoName }}" \
              "${ASSET_ID}" \
              "${ASSET_TYPE}" \
              "${HOME_DIR}" \
              "${{ github.event.inputs.synchProject }}" \
              "${SOURCE_TYPE}" \
              "${{ github.event.inputs.includeAllReferenceData }}" \
              "${PROVIDER}" \
              "${AZURE_VAULT_NAME}" \
              "${AZURE_RESOURCE_GROUP}" \
              "${AZURE_LOCATION}" \
              "${AZURE_TENANT_ID}" \
              "${AZURE_CLIENT_ID}" \
              "${AZURE_CLIENT_SECRET}" \
              "${AZURE_ACCESS_OBJECT_ID}" \
              "${{ github.event.inputs.fullBuild }}" \
              "qa" \
              "debug"
          else
            echo "Using Standard Import..."
            # Determine auth parameter based on type
            if [ "${AUTH_TYPE}" == "gen2" ]; then
              AUTH_PARAM="${X_INSTANCE_API_KEY}"
            else
              AUTH_PARAM="${ADMIN_USER}"
            fi
            
            ../self/pipelines/scripts/importAsset.sh \
              "${LOCAL_QA_URL}" \
              "${AUTH_PARAM}" \
              "${{ github.event.inputs.repoName }}" \
              "${ASSET_ID}" \
              "${ASSET_TYPE}" \
              "${HOME_DIR}" \
              "${{ github.event.inputs.synchProject }}" \
              "${SOURCE_TYPE}" \
              "${{ github.event.inputs.includeAllReferenceData }}" \
              "${PROVIDER}" \
              "${AZURE_VAULT_NAME}" \
              "${AZURE_RESOURCE_GROUP}" \
              "${AZURE_LOCATION}" \
              "${AZURE_TENANT_ID}" \
              "${AZURE_CLIENT_ID}" \
              "${AZURE_CLIENT_SECRET}" \
              "${AZURE_ACCESS_OBJECT_ID}" \
              "debug"
          fi

      # ── 6. Evaluate if test assets exist ─────────────────────────────────────
      - name: Evaluate Test Assets
        working-directory: ${{ github.event.inputs.repoName }}
        run: |
          FILE="./resources/test/environments/${SOURCE_TYPE}.json"
          if test -f "$FILE"; then
            echo "Test file found: $FILE"
            echo "FILE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "Test file not found: $FILE"
            echo "FILE_EXISTS=false" >> $GITHUB_ENV
          fi

      # ── 7. Trigger Test pipeline (only if test assets exist) ──────────────────
      - name: Trigger Test Pipeline
        if: ${{ env.FILE_EXISTS == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh workflow run test.yml \
            --repo "${{ vars.GIT_OWNER }}/${{ github.event.inputs.repoName }}" \
            --ref "${SOURCE_TYPE}" \
            --field "repoName=${{ github.event.inputs.repoName }}" \
            --field "branch=${SOURCE_TYPE}" \
            --field "environment=${SOURCE_TYPE}"

      # ── 8. Upload export artifact ─────────────────────────────────────────────
      - name: Publish Export Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.repoName }}_export
          path: ${{ github.workspace }}/${{ github.event.inputs.repoName }}
          retention-days: 7

      # ── 9. Clean up export folder ─────────────────────────────────────────────
      - name: Remove Export After Successful Import
        run: |
          rm -rf "${{ github.workspace }}/${{ github.event.inputs.repoName }}"
