##############################################################################################################
#                                                                                                            #
# synchronize_qa.yml : Imports assets to QA Stage                                                            #
# Converted from Azure DevOps to GitHub Actions                                                              #
#                                                                                                            #
# ####### Inputs ########                                                                                    #
# assetID:      (Optional) ID of the asset to be imported                                                    #
# assetType:    (Optional) Type of the asset. Supported: workflow, flowservice                               #
# repoName:     (Mandatory) Name of the corresponding repository                                             #
# synchProject: (Mandatory) true = sync full project; false = provide assetID + assetType                   #
# includeAllReferenceData: (Optional) Include all reference data on import                                   #
##############################################################################################################

name: Synchronize QA (Import)

on:
  workflow_dispatch:
    inputs:
      assetID:
        description: "(Optional) ID of the asset to import"
        required: false
        default: ""
      assetType:
        description: "(Optional) Type of the asset (workflow, flowservice)"
        required: false
        default: ""
      repoName:
        description: "(Mandatory) Name of the project repository"
        required: true
      synchProject:
        description: "(Mandatory) true = sync full project"
        required: true
        default: "false"
      includeAllReferenceData:
        description: "(Optional) Include all reference data on import"
        required: false
        default: "false"

jobs:
  synchronize-qa:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout pipeline/scripts repo (self) ─────────────────────────────
      - name: Checkout Pipeline Repo (self)
        uses: actions/checkout@v4
        with:
          submodules: "true"
          persist-credentials: "true"
          clean: "true"
          path: self

      # ── 2. Checkout project repo — always from the 'qa' branch ───────────────
      - name: Checkout Project Repo (qa branch)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GIT_OWNER }}/${{ github.event.inputs.repoName }}
          token: ${{ secrets.PAT }}
          ref: qa
          submodules: "true"
          persist-credentials: "true"
          clean: "true"
          path: ${{ github.event.inputs.repoName }}

      # ── 3. Adjust variables for full project sync ─────────────────────────────
      # NOTE: QA pipeline uses singular 'assetID' / 'assetType' (not List variants)
      - name: Adjust Variables (full project sync)
        if: ${{ github.event.inputs.synchProject == 'true' }}
        run: |
          echo "ASSET_ID=NA"   >> $GITHUB_ENV
          echo "ASSET_TYPE=NA" >> $GITHUB_ENV

      - name: Set Asset Variables from Inputs
        if: ${{ github.event.inputs.synchProject != 'true' }}
        run: |
          echo "ASSET_ID=${{ github.event.inputs.assetID }}"     >> $GITHUB_ENV
          echo "ASSET_TYPE=${{ github.event.inputs.assetType }}" >> $GITHUB_ENV

      # ── 4. Get environment tenant details from qa.yml ─────────────────────────
      # NOTE: Original had a typo — configs/env//qa.yml (double slash) — fixed here
      - name: Get Environment Tenant Details
        working-directory: self
        run: |
          pwd
          ls -ltr

          echo "SOURCE_ENV_HOSTNAME=$(yq -e '.tenant.hostname'      configs/env/qa.yml)" >> $GITHUB_ENV
          echo "SOURCE_ENV_PORT=$(yq -e '.tenant.port'              configs/env/qa.yml)" >> $GITHUB_ENV
          echo "ADMIN_USER=$(yq -e '.tenant.admin_username'         configs/env/qa.yml)" >> $GITHUB_ENV
          echo "SOURCE_TYPE=$(yq -e '.tenant.type'                  configs/env/qa.yml)" >> $GITHUB_ENV

          # URL-encode repo name (replaces perl URI::Escape)
          ENCODED_REPO=$(python3 -c \
            "import urllib.parse; print(urllib.parse.quote('${{ github.event.inputs.repoName }}'))")
          echo "ENCODED_REPO_NAME=${ENCODED_REPO}" >> $GITHUB_ENV
          echo "Build: ${{ github.run_number }}-${ENCODED_REPO}"

      # ── 5. Check / create project and import assets ───────────────────────────
      # NOTE: QA importAsset.sh has a shorter arg list — no Azure secrets, no PROVIDER
      - name: Import Asset
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          LOCAL_QA_URL="https://${SOURCE_ENV_HOSTNAME}:${SOURCE_ENV_PORT}"
          echo "Target URL: ${LOCAL_QA_URL}"
          HOME_DIR="${GITHUB_WORKSPACE}/"

          cd "${{ github.event.inputs.repoName }}"
          ls -ltr

          chmod +x -R ../self/pipelines/scripts/*.sh

          # Read existing project ID from project-config.yml
          existingProject_id=$(yq e '.project.project-id' "./project-config.yml")
          echo "Existing Project ID: [${existingProject_id}]"

          # Check and create project
          echo "Checking and creating project..."
          project_id=$(../self/pipelines/scripts/createProject.sh \
            "${LOCAL_QA_URL}" \
            "${ADMIN_USER}" \
            "${ADMIN_PASSWORD}" \
            "${{ github.event.inputs.repoName }}" \
            "${existingProject_id}" \
            "debug" 2> >(tee >&2))
          echo "Captured Project ID: [${project_id}]"

          # Import assets
          echo "Importing asset..."
          ../self/pipelines/scripts/importAsset.sh \
            "${LOCAL_QA_URL}" \
            "${ADMIN_USER}" \
            "${ADMIN_PASSWORD}" \
            "${{ github.event.inputs.repoName }}" \
            "${ASSET_ID}" \
            "${ASSET_TYPE}" \
            "${HOME_DIR}" \
            "${{ github.event.inputs.synchProject }}" \
            "${SOURCE_TYPE}" \
            "${{ github.event.inputs.includeAllReferenceData }}" \
            debug

      # ── 6. Evaluate if test assets exist ─────────────────────────────────────
      - name: Evaluate Test Assets
        working-directory: ${{ github.event.inputs.repoName }}
        run: |
          FILE="./resources/test/environments/${SOURCE_TYPE}.json"
          if test -f "$FILE"; then
            echo "Test file found: $FILE"
            echo "FILE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "Test file not found: $FILE"
            echo "FILE_EXISTS=false" >> $GITHUB_ENV
          fi

      # ── 7. Trigger Test pipeline (only if test assets exist) ──────────────────
      - name: Trigger Test Pipeline
        if: ${{ env.FILE_EXISTS == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh workflow run test.yml \
            --repo "${{ vars.GIT_OWNER }}/${{ github.event.inputs.repoName }}" \
            --ref "${SOURCE_TYPE}" \
            --field "repoName=${{ github.event.inputs.repoName }}" \
            --field "branch=${SOURCE_TYPE}" \
            --field "environment=${SOURCE_TYPE}"

      # ── 8. Upload export artifact ─────────────────────────────────────────────
      - name: Publish Export Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.repoName }}_export
          path: ${{ github.workspace }}/${{ github.event.inputs.repoName }}
          retention-days: 7

      # ── 9. Clean up export folder ─────────────────────────────────────────────
      - name: Remove Export After Successful Import
        run: |
          rm -rf "${{ github.workspace }}/${{ github.event.inputs.repoName }}"
